                foundAny = true; 
                
       const div = document.createElement("div");

div.innerHTML = `<p><b>•</b> ${q.kd}</p>`;

        
        kdList.appendChild(div); 
    } 
}); 

if (!foundAny) { 
    kdList.innerHTML = "<p>No knowledge deficiencies identified – great work!</p>"; 
} 
} 

function restartQuiz() { 
       document.getElementById("results-container").style.display = "none";
   
    // Hide review container 
    document.getElementById("review-container").style.display = "none"; 
    
    // Reset state 
    currentQuestion = 0; 
    userAnswers = []; 
    flaggedQuestions = []; 
    
    // Fetch the JSON again (or reuse already loaded data) 
    fetch(jsonURL) 
    .then(res => res.json()) 
    .then(data => { 
        // Pick 5 random questions 
    questions = getRandomQuestions(data.questions, 30); 
    
    // Initialize user answers 
    userAnswers = Array(questions.length).fill(undefined); 
    
    // 🔄 Re-render navigation immediately
    renderQuestionNav();   

    // Show main quiz container 
    document.getElementById("main-quiz-container").style.display = "flex";

    
    // Reset buttons 
    prevBtn.disabled = true; 
    
    // Reset timer 
    clearInterval(timerInterval); 
    startTimer(); 
    timerEl.style.color = "#333";

    
    // Render first question 
    renderQuestion(); 
})
 .catch(err => { 
    console.error("Failed to reload JSON:", err); 
    questionEl.textContent = "Failed to load questions. Check JSON path and format."; 
}); 
} 

function goToNextQuestion() {
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        renderQuestion();
        renderQuestionNav();
    }
}

function goToPreviousQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
        renderQuestionNav();
    }
}
document.addEventListener("keydown", function (event) {

    // Ignore if user is typing in an input field
    if (event.target.tagName === "INPUT" || event.target.tagName === "TEXTAREA") {
        return;
    }

    if (event.key === "ArrowRight") {
        goToNextQuestion();
    }

    if (event.key === "ArrowLeft") {
        goToPreviousQuestion();
    }

});

function exitReview() {
    document.getElementById("review-container").style.display = "none";
    document.getElementById("results-container").style.display = "block";
}


function returnToReview() { 
    document.getElementById("kd-container").style.display = "none"; 
    document.getElementById("review-container").style.display = "block"; 
} 

function updateTimer(seconds){ 
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60); 
    const s = seconds % 60; 

    if (h > 0) {
        timerEl.textContent = `Time left: ${h}:${
            m.toString().padStart(2,'0')
        }:${
            s.toString().padStart(2,'0')
        }`;
    } else {
        timerEl.textContent = `Time left: ${
            m.toString().padStart(2,'0')
        }:${
            s.toString().padStart(2,'0')
        }`;
    }

    // Turn red at 5 minutes or less
    if(seconds <= 300) timerEl.style.color = "red"; 
    else timerEl.style.color = "#333";
} 
    
    </script>
